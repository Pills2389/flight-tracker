name: ✈️ Daily Flight Check

on:
  schedule:
    # Six times daily, every 3 hours starting at 02:11 UTC. Cron is UTC and doesn't follow DST.
    # 02:11 UTC = 05:11 EEST (summer) / 04:11 EET (winter)
    # 05:11 UTC = 08:11 EEST (summer) / 07:11 EET (winter)
    # 08:11 UTC = 11:11 EEST (summer) / 10:11 EET (winter)
    # 11:11 UTC = 14:11 EEST (summer) / 13:11 EET (winter)
    # 14:11 UTC = 17:11 EEST (summer) / 16:11 EET (winter)
    # 17:11 UTC = 20:11 EEST (summer) / 19:11 EET (winter)
    - cron: '11 2,5,8,11,14,17 * * *'
  workflow_dispatch:
    # Allows manual trigger from the GitHub Actions tab

jobs:
  check-flights:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to commit price_history.json and docs/

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write config from secret
        env:
          FLIGHT_CONFIG: ${{ secrets.FLIGHT_CONFIG }}
        run: printf '%s' "$FLIGHT_CONFIG" > config.json

      - name: Run flight tracker
        run: python flight_tracker.py

      - name: Commit updated data and dashboard
        run: |
          git config user.name  "Flight Tracker Bot"
          git config user.email "flight-tracker@users.noreply.github.com"
          git add price_history.json docs/
          git diff --staged --quiet \
            && echo "No changes to commit" \
            || (git commit -m "📊 $(date -u +'%Y-%m-%d %H:%M UTC') — prices updated" \
                && git push)
